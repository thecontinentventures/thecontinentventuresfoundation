<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | The Continent Ventures Foundation</title>
    
    <link rel="icon" type="image/jpeg" href="{{ '/assets/images/logo.jpg' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary-green: #0a2f10; --accent-gold: #d4af37; --off-white: #ffffff; }
        body { background-color: var(--primary-green); color: var(--off-white); font-family: 'Plus Jakarta Sans', sans-serif; padding-top: 120px; }
        
        /* Navbar Styling */
        .navbar { background: rgba(10, 47, 16, 0.95) !important; backdrop-filter: blur(15px); border-bottom: 1px solid rgba(212, 175, 55, 0.3); }
        .nav-link { color: var(--off-white) !important; text-transform: uppercase; font-size: 0.85rem; margin: 0 10px; }

        /* Blog Content Styling */
        .blog-header { text-align: center; margin-bottom: 50px; }
        .blog-header h1 { font-family: 'Playfair Display', serif; color: var(--accent-gold); font-size: 3rem; }
        .blog-post-content { max-width: 800px; margin: 0 auto; line-height: 1.8; font-size: 1.1rem; padding-bottom: 80px; }
        .blog-post-content img { width: 100%; border-radius: 15px; border: 1px solid var(--accent-gold); margin: 30px 0; }
        .blog-post-content h2, .blog-post-content h3 { color: var(--accent-gold); font-family: 'Playfair Display', serif; margin-top: 40px; }

        footer { padding: 40px 0; background: #051a09; border-top: 1px solid var(--accent-gold); margin-top: 50px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold" href="{{ '/' | relative_url }}">
                <img src="{{ '/assets/images/logo.jpg' | relative_url }}" alt="Logo" height="45" class="me-3 rounded-circle border border-warning">
                <span class="text-uppercase" style="font-size: 0.95rem; line-height: 1.2;">The <span style="color:var(--accent-gold)">Continent</span> Ventures<br>
                <small class="fw-light" style="font-size: 0.55em; letter-spacing: 3px; color: #ddd;">Foundation</small></span>
            </a>
        </div>
    </nav>

    <article class="container">
        <header class="blog-header">
            <p class="text-uppercase fw-bold" style="letter-spacing: 3px; color: var(--accent-gold);">{{ page.date | date: "%B %d, %Y" }}</p>
            <h1>{{ page.title }}</h1>
        </header>

        <div class="blog-post-content">
            {{ content }}
        </div>
    </article>

    <footer class="text-center">
        <div class="container d-flex justify-content-between align-items-center text-white">
            <p class="m-0">&copy; {{ "now" | date: "%Y" }} The Continent Ventures Foundation.</p>
        </div>
    </footer>

</body>
</html>
