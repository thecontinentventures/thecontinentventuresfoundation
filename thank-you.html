<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | The Continent Ventures</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #2e7d32;
            --deep-black: #0a0a0a;
        }

        body {
            background-color: var(--deep-black);
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        .thank-you-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 60px 40px;
            border-radius: 30px;
            border: 1px solid rgba(46, 125, 50, 0.3);
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            font-size: 4rem;
            color: var(--primary-green);
            margin-bottom: 25px;
        }

        .brand-name {
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 1rem;
            margin-bottom: 25px;
            opacity: 0.9;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-name img {
            height: 30px;
            margin-right: 10px;
            border-radius: 50%;
        }

        h1 { 
            color: var(--primary-green); 
            font-weight: 800; 
            margin-bottom: 15px;
            font-size: 2.2rem;
        }

        p { 
            font-size: 1.1rem; 
            opacity: 0.7; 
            line-height: 1.6;
        }

        .btn-home {
            background: linear-gradient(135deg, var(--primary-green) 0%, #1b5e20 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            margin-top: 35px;
            display: inline-block;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s ease;
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.2);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(46, 125, 50, 0.3);
            color: white;
        }
    </style>
</head>
<body>
    <div class="thank-you-card">
        <div class="brand-name">
            <img src="logo.jpg" alt="Logo">
            The Continent Ventures
        </div>
        <div class="success-icon">
            <i class="fa-regular fa-circle-check"></i>
        </div>
        <h1>Message Received!</h1>
        <p>Thank you for reaching out to us. Your inquiry has been successfully sent, and our team will get back to you shortly.</p>
        <a href="index.html" class="btn-home">Back to Home</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
