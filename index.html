<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Continent Ventures | Supporting Africa's Children</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2e7d32;
            --deep-black: #0a0a0a;
            --pure-white: #ffffff;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-black);
            overflow-x: hidden;
        }

        /* Navigation */
        .navbar { 
            background-color: rgba(0, 0, 0, 0.85) !important;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary-green);
            z-index: 1000;
            padding: 15px 0;
        }
        .text-green { color: var(--primary-green) !important; }

        /* Full-Screen Video Background */
        #video-viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            background: #000;
        }

        #bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.5); /* Darkens video for text readability */
        }

        /* Fallback Background for very slow connections */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
        }

        .hero-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--pure-white);
            padding: 0 20px;
        }

        /* Dynamic Animations */
        .animate-up {
            animation: fadeInUp 1.2s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-content h1 {
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .btn-green { 
            background-color: var(--primary-green); 
            color: white; 
            border: none; 
            padding: 16px 45px;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
        }
        .btn-green:hover { 
            background-color: #1b5e20; 
            color: white; 
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.6);
        }

        footer {
            background-color: transparent;
            color: white;
            padding: 20px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">
                <img src="logo.jpg" alt="Logo" height="50" class="me-2 rounded-circle">
                <span>THE <span class="text-green">CONTINENT</span> VENTURES</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active fw-bold" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-green ms-lg-4 px-4 py-2" href="donate.html">Donate Now</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="video-viewport">
        <video id="bg-video" autoplay muted loop playsinline preload="auto" poster="https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?auto=format&fit=crop&w=1920&q=80">
            <source src="https://player.vimeo.com/external/370331493.hd.mp4?s=338c351f38e697841c10d3f2956f4d2a1389e13d&profile_id=175" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="video-overlay"></div>
    </div>

    <header class="hero-container">
        <div class="hero-content">
            <h1 class="display-1 animate-up mb-3">Empowering Africa's Future</h1>
            <p class="lead animate-up fs-3 mb-5" style="animation-delay: 0.3s;">Building hope for needy children through community and care.</p>
            <div class="d-flex justify-content-center gap-3 animate-up" style="animation-delay: 0.6s;">
                <a href="about.html" class="btn btn-outline-light btn-lg rounded-pill px-5">Our Story</a>
                <a href="donate.html" class="btn btn-green btn-lg px-5">Get Involved</a>
            </div>
        </div>
    </header>

    <footer class="text-center">
        <div class="container">
            <p class="small opacity-75 text-white m-0">
                &copy; <span id="currentYear"></span> The Continent Ventures. All Rights Reserved.
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Update the Year automatically
        document.getElementById("currentYear").textContent = new Date().getFullYear();

        // Browser Force-Play Script
        // Some mobile browsers block autoplay until the user interacts. 
        // This script attempts to play the video as soon as the page loads.
        window.addEventListener('load', function() {
            var video = document.getElementById('bg-video');
            var promise = video.play();

            if (promise !== undefined) {
                promise.then(_ => {
                    // Autoplay started!
                }).catch(error => {
                    // Autoplay was prevented. Show a message or play on first click.
                    console.log("Video playback delayed by browser settings.");
                });
            }
        });
    </script>
</body>
</html>
